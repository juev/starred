name: build

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      -
        name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
      -
        name: Install dependencies
        run: |
          go version
          go install honnef.co/go/tools/cmd/staticcheck@latest
      -
        name: Run build
        run: go build .
      -
        name: Run vet & lint
        run: |
          go vet .
          staticcheck .
